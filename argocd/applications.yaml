apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tf1-sandbox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nghia1245654/config-repo.git
    targetRevision: HEAD
    path: overlays/sandbox/
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
