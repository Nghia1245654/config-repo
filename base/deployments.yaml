apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: ai-engine
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      serviceAccountName: ai-engine
      containers:
        - name: ai-engine
          image: 022267198114.dkr.ecr.us-east-1.amazonaws.com/tf1/ai-engine:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlator-worker
  namespace: tf1-aiops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: correlator-worker
  template:
    metadata:
      labels:
        app: correlator-worker
    spec:
      serviceAccountName: cdo-correlator-worker
      containers:
        - name: correlator-worker
          image: 022267198114.dkr.ecr.us-east-1.amazonaws.com/tf1/correlator-worker:latest
          env:
            - name: SQS_QUEUE_URL
              value: https://sqs.us-east-1.amazonaws.com/022267198114/tf1-sandbox-alert-queue.fifo
            - name: DYNAMODB_TABLE
              value: tf1-sandbox-incident-state
            - name: S3_BUCKET
              value: tf1-audit-022267198114
            - name: AI_ENGINE_URL
              value: http://ai-engine-service.ai-engine.svc.cluster.local:8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
